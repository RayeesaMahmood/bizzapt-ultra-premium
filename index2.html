<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bizzapt Enterprises | AI, IoT, Cybersecurity & ICT Solutions</title>

    <meta
      name="description"
      content="Bizzapt Enterprises delivers AI, IoT, Cybersecurity, Cloud and ICT solutions for enterprises in Saudi Arabia, India, UAE and neighboring regions."
    />
    <meta
      name="keywords"
      content="Bizzapt Enterprises, AI Solutions Saudi Arabia, IoT UAE, Cybersecurity India, ICT Solutions, Enterprise Digital Transformation"
    />
    <meta name="author" content="Bizzapt Enterprises" />
    <meta property="og:title" content="Bizzapt Enterprises" />
    <meta
      property="og:description"
      content="AI, IoT, Cybersecurity & ICT solutions for enterprises in Saudi Arabia, India and UAE."
    />
    <meta property="og:type" content="website" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Bizzapt Enterprises",
        "url": "https://bizzapt.com",
        "logo": "bizzapt.png",
        "description": "AI, IoT, Cybersecurity and ICT solutions for enterprises in Saudi Arabia, India and UAE."
      }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #051016;
        --bg-2: #0a1820;
        --bg-3: #112630;
        --card: rgba(255, 255, 255, 0.07);
        --card-strong: rgba(255, 255, 255, 0.12);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f4fbf8;
        --muted: #b4c6c2;
        --mint: #51d8c2;
        --mint-soft: #b8fff1;
        --sage: #91ab82;
        --gold: #e5d2a4;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Inter", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, rgba(81, 216, 194, 0.14), transparent 24%),
          radial-gradient(circle at 100% 0%, rgba(145, 171, 130, 0.12), transparent 22%),
          linear-gradient(135deg, #02090d 0%, #071116 40%, #0c1820 100%);
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .app {
        position: relative;
      }

      .pattern-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.11;
        background-image:
          radial-gradient(circle at 25px 25px, rgba(184, 255, 241, 0.35) 2px, transparent 2px),
          linear-gradient(45deg, transparent 47%, rgba(184, 255, 241, 0.08) 48%, rgba(184, 255, 241, 0.08) 52%, transparent 53%),
          linear-gradient(-45deg, transparent 47%, rgba(184, 255, 241, 0.08) 48%, rgba(184, 255, 241, 0.08) 52%, transparent 53%);
        background-size: 80px 80px, 80px 80px, 80px 80px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 90%);
      }

      .container {
        width: min(1220px, calc(100% - 32px));
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 90;
        background: rgba(2, 9, 13, 0.72);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--line);
      }

      .nav {
        min-height: 84px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-logo {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 6px;
      }

      .brand-text strong {
        display: block;
        font-size: 1rem;
        letter-spacing: 0.3px;
      }

      .brand-text span {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
        color: var(--muted);
        font-weight: 600;
      }

      .nav-links a:hover {
        color: var(--text);
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .lang-btn,
      .btn {
        border-radius: 999px;
        font-weight: 800;
      }

      .lang-btn {
        padding: 11px 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
      }

      .btn {
        border: 0;
        cursor: pointer;
        padding: 14px 22px;
        transition: 0.28s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        color: #071116;
        background: linear-gradient(135deg, var(--mint), var(--mint-soft), #f0fff9);
        box-shadow: 0 18px 34px rgba(81, 216, 194, 0.24);
      }

      .btn-secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--line);
      }

      section {
        padding: 46px 0;
      }

      .hero {
        padding: 74px 0 36px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1.02fr 0.98fr;
        gap: 28px;
        align-items: center;
      }

      .eyebrow,
      .small-tag {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        font-weight: 700;
      }

      .eyebrow {
        padding: 9px 15px;
        margin-bottom: 18px;
        background: linear-gradient(135deg, rgba(81, 216, 194, 0.12), rgba(145, 171, 130, 0.1));
        border: 1px solid rgba(81, 216, 194, 0.2);
        color: var(--mint-soft);
        font-size: 0.9rem;
      }

      .hero h1 {
        font-size: clamp(2.8rem, 6vw, 5.6rem);
        line-height: 0.95;
        letter-spacing: -2.2px;
        max-width: 760px;
      }

      .gradient {
        background: linear-gradient(135deg, #ffffff 12%, #b8fff1 42%, #c7d9b9 75%, #f2ead8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p,
      .section-head p,
      .feature-item p,
      .service p,
      .project p,
      .region-card p,
      .blog-card p,
      .map-copy p,
      .contact-card p,
      .footer,
      .mini-panel p,
      .dev-card p,
      .insight-strip p {
        color: var(--muted);
        line-height: 1.8;
      }

      .hero p {
        margin: 20px 0 26px;
        max-width: 640px;
        font-size: 1.05rem;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 28px;
      }

      .hero-stats,
      .feature-grid,
      .service-grid,
      .project-grid,
      .region-grid,
      .blog-grid,
      .contact-grid,
      .hero-panels,
      .project-meta,
      .two-col {
        display: grid;
        gap: 18px;
      }

      .hero-stats,
      .hero-panels,
      .feature-grid,
      .service-grid,
      .project-grid,
      .region-grid,
      .blog-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .hero-stats {
        gap: 14px;
      }

      .stat-card,
      .glass-card,
      .feature-item,
      .service,
      .project,
      .region-card,
      .blog-card,
      .map-copy,
      .map-card,
      .contact-card,
      .form-card,
      .insight-strip,
      .footer-panel,
      .mini-panel,
      .dev-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .stat-card,
      .feature-item,
      .service,
      .contact-card,
      .form-card,
      .insight-strip,
      .map-copy {
        border-radius: 28px;
      }

      .stat-card {
        padding: 18px;
      }

      .stat-card strong {
        display: block;
        font-size: 1.9rem;
      }

      .stat-card span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
      }

      .hero-visual {
        position: relative;
        min-height: 720px;
      }

      .glass-card {
        position: absolute;
        inset: 0;
        border-radius: 34px;
        overflow: hidden;
      }

      .glass-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 25% 18%, rgba(81, 216, 194, 0.14), transparent 18%),
          radial-gradient(circle at 78% 20%, rgba(145, 171, 130, 0.12), transparent 18%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 40%);
      }

      .hero-logo-badge {
        position: absolute;
        top: 22px;
        left: 22px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 22px;
        background: rgba(7, 17, 24, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
      }

      .hero-logo-badge img {
        width: 54px;
        height: 54px;
        object-fit: contain;
      }

      .hero-logo-badge strong {
        display: block;
        font-size: 0.96rem;
      }

      .hero-logo-badge span {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .globe-wrap {
        position: absolute;
        inset: 84px 24px 176px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .globe-canvas {
        width: 100%;
        height: 100%;
        min-height: 420px;
      }

      .hero-panels {
        position: absolute;
        left: 24px;
        right: 24px;
        bottom: 24px;
        gap: 14px;
      }

      .mini-panel {
        padding: 16px;
        border-radius: 20px;
        background: rgba(7, 17, 24, 0.76);
        backdrop-filter: blur(12px);
      }

      .mini-panel strong {
        display: block;
        margin-bottom: 6px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 20px;
        margin-bottom: 24px;
      }

      .section-head h2 {
        font-size: clamp(2rem, 3vw, 3rem);
        line-height: 1.06;
        max-width: 740px;
      }

      .section-head p {
        max-width: 580px;
      }

      .feature-item,
      .service,
      .project-copy,
      .region-copy,
      .blog-copy,
      .contact-card,
      .form-card,
      .map-copy {
        padding: 24px;
      }

      .feature-icon,
      .service-icon {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        font-size: 1.5rem;
        background: linear-gradient(135deg, rgba(81, 216, 194, 0.18), rgba(145, 171, 130, 0.14));
        border: 1px solid rgba(81, 216, 194, 0.18);
      }

      .feature-item h4,
      .service h4,
      .project h4,
      .region-card h4,
      .blog-card h4,
      .contact-card h4,
      .form-card h4,
      .insight-strip h4,
      .map-copy h4 {
        font-size: 1.22rem;
        margin-bottom: 10px;
      }

      .insight-strip {
        margin-top: 24px;
        padding: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
      }

      .service,
      .project,
      .region-card,
      .blog-card,
      .feature-item {
        transition: 0.3s ease;
      }

      .service:hover,
      .project:hover,
      .region-card:hover,
      .blog-card:hover,
      .feature-item:hover {
        transform: translateY(-8px);
      }

      .service-link,
      .project-link,
      .blog-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        color: var(--mint-soft);
        font-weight: 700;
      }

      .project,
      .region-card,
      .blog-card,
      .map-card {
        border-radius: 28px;
        overflow: hidden;
      }

      .project-image,
      .region-image,
      .blog-image {
        height: 240px;
        background-size: cover;
        background-position: center;
        position: relative;
      }

      .project-image::before,
      .region-image::before,
      .blog-image::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(3, 9, 13, 0.48));
      }

      .project-pills,
      .blog-pills {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill,
      .small-tag {
        padding: 8px 12px;
        background: rgba(7, 17, 24, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
      }

      .pill {
        border-radius: 999px;
        font-weight: 700;
      }

      .small-tag {
        margin-bottom: 12px;
      }

      .project-meta {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }

      .project-meta div,
      .map-item,
      .contact-item {
        padding: 12px 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .project-meta strong,
      .map-item strong,
      .contact-item strong,
      .dev-card strong {
        display: block;
        margin-bottom: 4px;
      }

      .project-meta span,
      .map-item span,
      .contact-item span {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .map-layout {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 18px;
      }

      .map-frame {
        width: 100%;
        height: 100%;
        min-height: 480px;
        border: 0;
      }

      .map-list,
      .contact-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .contact-grid {
        grid-template-columns: 1fr 1fr;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .two-col {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 15px 16px;
        border-radius: 18px;
        outline: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(7, 17, 24, 0.78);
        color: var(--text);
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(81, 216, 194, 0.42);
        box-shadow: 0 0 0 3px rgba(81, 216, 194, 0.12);
      }

      .footer {
        padding: 28px 0 48px;
      }

      .footer-panel {
        border-radius: 28px;
        padding: 22px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .footer-devs {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        width: 100%;
        margin-top: 8px;
      }

      .dev-card {
        flex: 1 1 280px;
        padding: 16px;
        border-radius: 18px;
      }

      .dev-card a {
        display: inline-block;
        margin-top: 6px;
        color: var(--mint-soft);
        line-height: 1.6;
      }

      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: 0.8s ease;
      }

      .reveal.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 1100px) {
        .hero-grid,
        .map-layout,
        .contact-grid,
        .hero-stats,
        .hero-panels,
        .feature-grid,
        .service-grid,
        .project-grid,
        .region-grid,
        .blog-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 820px) {
        .nav-links,
        .nav-actions {
          display: none;
        }

        .hero-grid,
        .map-layout,
        .contact-grid,
        .hero-stats,
        .hero-panels,
        .feature-grid,
        .service-grid,
        .project-grid,
        .region-grid,
        .blog-grid,
        .project-meta,
        .two-col {
          grid-template-columns: 1fr;
        }

        .section-head {
          flex-direction: column;
          align-items: flex-start;
        }

        .hero-visual {
          min-height: 800px;
        }

        .globe-wrap {
          inset: 84px 18px 250px 18px;
        }
      }

      @media (max-width: 560px) {
        .container {
          width: min(1220px, calc(100% - 20px));
        }

        .hero h1 {
          letter-spacing: -1.2px;
        }
      }

      /* ===== Red / Black vibrant theme override ===== */
      :root {
        --bg: #090909;
        --bg-2: #140707;
        --bg-3: #230909;
        --card: rgba(255, 255, 255, 0.06);
        --card-strong: rgba(255, 255, 255, 0.11);
        --line: rgba(255, 72, 72, 0.18);
        --text: #fff5f5;
        --muted: #d9baba;
        --mint: #ff2a2a;
        --mint-soft: #ff7a7a;
        --sage: #ff4d67;
        --gold: #ffd2d2;
        --shadow: 0 30px 80px rgba(0, 0, 0, 0.46);
      }

      body {
        background:
          radial-gradient(circle at 0% 0%, rgba(255, 58, 58, 0.16), transparent 24%),
          radial-gradient(circle at 100% 0%, rgba(255, 110, 110, 0.12), transparent 22%),
          radial-gradient(circle at 50% 100%, rgba(120, 0, 0, 0.20), transparent 30%),
          linear-gradient(135deg, #050505 0%, #0d0507 42%, #170608 100%);
      }

      .pattern-layer {
        opacity: 0.08;
        background-image:
          radial-gradient(circle at 25px 25px, rgba(255, 120, 120, 0.25) 2px, transparent 2px),
          linear-gradient(45deg, transparent 47%, rgba(255, 120, 120, 0.05) 48%, rgba(255, 120, 120, 0.05) 52%, transparent 53%),
          linear-gradient(-45deg, transparent 47%, rgba(255, 120, 120, 0.05) 48%, rgba(255, 120, 120, 0.05) 52%, transparent 53%);
      }

      .btn-primary {
        color: #fff7f7;
        background: linear-gradient(135deg, #ff2323, #ff4d4d, #ff8a8a);
        box-shadow: 0 18px 34px rgba(255, 42, 42, 0.3);
      }

      .btn-secondary:hover,
      .lang-btn:hover {
        border-color: rgba(255, 88, 88, 0.35);
        background: rgba(255, 255, 255, 0.08);
      }

      .gradient {
        background: linear-gradient(135deg, #ffffff 10%, #ffd7d7 35%, #ff6f6f 62%, #ff2b2b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .feature-icon,
      .service-icon {
        background: linear-gradient(135deg, rgba(255, 45, 45, 0.20), rgba(255, 120, 120, 0.12));
        border: 1px solid rgba(255, 76, 76, 0.24);
      }

      .eyebrow {
        background: linear-gradient(135deg, rgba(255, 45, 45, 0.16), rgba(255, 120, 120, 0.10));
        border: 1px solid rgba(255, 76, 76, 0.25);
        color: #ffd0d0;
      }

      /* ===== Homepage hero override only ===== */
      .hero {
        padding: 82px 0 42px;
        overflow: hidden;
      }

      .hero-grid {
        grid-template-columns: 0.95fr 1.05fr;
        gap: 36px;
        align-items: center;
      }

      .hero-copy {
        max-width: 620px;
      }

      .hero-copy h1 {
        font-size: clamp(3.1rem, 5.3vw, 5.4rem);
        line-height: 0.94;
        letter-spacing: -2.5px;
        margin-bottom: 0;
      }

      .hero-copy p {
        max-width: 600px;
      }

      .hero-visual {
        min-height: 760px;
        perspective: 1600px;
      }

      .hero-stage {
        position: absolute;
        inset: 0;
        border-radius: 36px;
        overflow: hidden;
        border: 1px solid rgba(255, 78, 78, 0.18);
        background:
          radial-gradient(circle at 50% 55%, rgba(255, 65, 65, 0.12), transparent 24%),
          radial-gradient(circle at 15% 12%, rgba(255, 110, 110, 0.12), transparent 18%),
          radial-gradient(circle at 85% 18%, rgba(255, 140, 140, 0.10), transparent 18%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      }

      .hero-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 92%);
        opacity: 0.35;
        pointer-events: none;
      }

      .hero-stage::after {
        content: "";
        position: absolute;
        inset: auto 50px 38px 50px;
        height: 110px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 59, 59, 0.22), transparent 70%);
        filter: blur(26px);
        z-index: 0;
      }

      .hero-brand {
        position: absolute;
        top: 24px;
        left: 24px;
        z-index: 4;
        display: flex;

      function Globe3D() {
        const mountRef = useRef(null);

        useEffect(() => {
          const mount = mountRef.current;
          if (!mount || !window.THREE) return;

          const width = mount.clientWidth || 420;
          const height = mount.clientHeight || 420;

          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
          camera.position.z = 4.8;

          const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          renderer.setSize(width, height);
          mount.innerHTML = "";
          mount.appendChild(renderer.domElement);

          const group = new THREE.Group();
          scene.add(group);

          const sphereGeometry = new THREE.SphereGeometry(1.2, 64, 64);
          const sphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x0d2a33,
            emissive: 0x0f3f46,
            shininess: 20,
            transparent: true,
            opacity: 0.92,
            wireframe: false
          });
          const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
          group.add(sphere);

          const wireGeometry = new THREE.SphereGeometry(1.22, 28, 28);
          const wireMaterial = new THREE.MeshBasicMaterial({
            color: 0x7fffe2,
            wireframe: true,
            transparent: true,
            opacity: 0.22
          });
          const wire = new THREE.Mesh(wireGeometry, wireMaterial);
          group.add(wire);

          const ringMaterial = new THREE.MeshBasicMaterial({
            color: 0xb8fff1,
            transparent: true,
            opacity: 0.22,
            side: THREE.DoubleSide
          });

          const ring1 = new THREE.Mesh(new THREE.TorusGeometry(1.9, 0.01, 16, 120), ringMaterial);
          ring1.rotation.x = Math.PI / 2.8;
          scene.add(ring1);

          const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.75, 0.01, 16, 120), ringMaterial.clone());
          ring2.rotation.y = Math.PI / 3.2;
          ring2.material.opacity = 0.18;
          scene.add(ring2);

          const ring3 = new THREE.Mesh(new THREE.TorusGeometry(1.85, 0.01, 16, 120), ringMaterial.clone());
          ring3.rotation.z = Math.PI / 4;
          ring3.rotation.x = Math.PI / 2.4;
          ring3.material.opacity = 0.14;
          scene.add(ring3);

          const pointsGroup = new THREE.Group();
          const pointMaterial = new THREE.MeshBasicMaterial({ color: 0xe5d2a4 });
          const pointGeometry = new THREE.SphereGeometry(0.035, 12, 12);
          const pointPositions = [
            [0.4, 0.8, 0.7],
            [-0.7, 0.4, 0.9],
            [0.9, -0.3, 0.5],
            [-0.5, -0.8, 0.7],
            [0.2, -0.9, -0.8],
            [-0.9, 0.2, -0.6]
          ];

          pointPositions.forEach(([x, y, z]) => {
            const point = new THREE.Mesh(pointGeometry, pointMaterial);
            point.position.set(x, y, z);
            pointsGroup.add(point);
          });
          group.add(pointsGroup);

          const ambient = new THREE.AmbientLight(0xffffff, 0.8);
          scene.add(ambient);

          const pointLight = new THREE.PointLight(0x9de9dd, 1.6, 100);
          pointLight.position.set(4, 3, 5);
          scene.add(pointLight);

          const pointLight2 = new THREE.PointLight(0xe5d2a4, 0.9, 100);
          pointLight2.position.set(-4, -2, 4);
          scene.add(pointLight2);

          let frameId;
          const animate = () => {
            frameId = requestAnimationFrame(animate);
            group.rotation.y += 0.004;
            wire.rotation.y -= 0.002;
            ring1.rotation.z += 0.002;
            ring2.rotation.x += 0.0022;
            ring3.rotation.y += 0.0018;
            renderer.render(scene, camera);
          };
          animate();

          const handleResize = () => {
            const newWidth = mount.clientWidth || 420;
            const newHeight = mount.clientHeight || 420;
            camera.aspect = newWidth / newHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(newWidth, newHeight);
          };

          window.addEventListener("resize", handleResize);

          return () => {
            cancelAnimationFrame(frameId);
            window.removeEventListener("resize", handleResize);
            renderer.dispose();
            mount.innerHTML = "";
          };
        }, []);

        return <div ref={mountRef} className="globe-canvas" aria-label="Rotating 3D globe"></div>;
      }

            const onMove = (event) => {
              const rect = card.getBoundingClientRect();
              const x = event.clientX - rect.left;
              const y = event.clientY - rect.top;
              const rotateY = ((x / rect.width) - 0.5) * 16;
              const rotateX = (0.5 - (y / rect.height)) * 14;
              const base = getComputedStyle(card).getPropertyValue("--card-rotate") || "0deg";
              card.style.transform = `translateY(-10px) rotate(${base}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            };

            const onLeave = () => {
              const base = getComputedStyle(card).getPropertyValue("--card-rotate") || "0deg";
              card.style.transform = `rotate(${base})`;
            };

            card.addEventListener("mousemove", onMove);
            card.addEventListener("mouseleave", onLeave);

            return () => {
              card.removeEventListener("mousemove", onMove);
              card.removeEventListener("mouseleave", onLeave);
            };
          });

          return () => cleanups.forEach((fn) => fn());
        }, []);

            { threshold: 0.14 }

          return () => observer.disconnect();

                      Enterprise technology services presented with cleaner structure, stronger storytelling, and a more elegant visual language suitable for serious corporate audiences.
                    </p>
                  </div>

                  <div className="service-grid">
                    {services.map((service, index) => (
                      <article className="service reveal" key={index}>
                        <div className="service-icon">{service.icon}</div>
                        <h4>{service.title}</h4>
                        <p>{service.text}</p>
                        <a className="service-link" href="#contact">Learn More →</a>
                      </article>
                    ))}
                  </div>
                </div>
              </section>

              <section id="solutions">
                <div className="container">
                  <div className="section-head reveal">
                    <div>
                      <h2>Solutions and strategic delivery stories that feel enterprise-grade and future ready.</h2>
                    </div>
                    <p>
                      These sections help Bizzapt look active, modern, and capable of supporting serious organizations across complex digital initiatives.
                    </p>
                  </div>

                  <div className="project-grid">
                    {projects.map((project, index) => (
                      <article className="project reveal" key={index}>
                        <div className="project-image" style={{ backgroundImage: `url(${project.image})` }}>
                          <div className="project-pills">
                            <span className="pill">{project.status}</span>
                            <span className="pill">{project.location}</span>
                          </div>
                        </div>
                        <div className="project-copy">
                          <div className="small-tag">{project.type}</div>
                          <h4>{project.title}</h4>
                          <p>{project.text}</p>
                          <div className="project-meta">
                            <div><strong>Area</strong><span>{project.area}</span></div>
                            <div><strong>Scale</strong><span>{project.scale}</span></div>
                            <div><strong>Impact</strong><span>{project.impact}</span></div>
                          </div>
                          <a className="project-link" href="#contact">See More →</a>
                        </div>
                      </article>
                    ))}
                  </div>
                </div>
              </section>

              <section>
                <div className="container">
                  <div className="section-head reveal">
                    <div>
                      <h2>Regional relevance for Saudi Arabia, India, UAE, and neighboring enterprise markets.</h2>
                    </div>
                    <p>
                      This section reinforces geographic fit and helps corporate visitors immediately understand where Bizzapt is focused and ready to support growth.
                    </p>
                  </div>

                  <div className="region-grid">
                    {regions.map((region, index) => (
                      <article className="region-card reveal" key={index}>
                        <div className="region-image" style={{ backgroundImage: `url(${region.image})` }}></div>
                        <div className="region-copy">
                          <h4>{region.title}</h4>
                          <p>{region.text}</p>
                        </div>
                      </article>
                    ))}
                  </div>
                </div>
              </section>

              <section id="blogs">
                <div className="container">
                  <div className="section-head reveal">
                    <div>
                      <h2>Latest Blogs</h2>
                    </div>
                    <p>
                      A blog section structured to support thought leadership, SEO, and ongoing content marketing efforts that keep the website active and relevant for enterprise audiences.
                    </p>

                  </div>

                  <div className="blog-grid">
                    {blogs.map((blog, index) => (
                      <article className="blog-card reveal" key={index}>
                        <div className="blog-image" style={{ backgroundImage: `url(${blog.image})` }}>
                          <div className="blog-pills">
                            <span className="pill">{blog.category}</span>
                            <span className="pill">{blog.tag}</span>
                          </div>
                        </div>
                        <div className="blog-copy">
                          <h4>{blog.title}</h4>
                          <p>{blog.excerpt}</p>
                          <a className="blog-link" href={blog.link}>Read Blog →</a>
                        </div>
                      </article>
                    ))}
                  </div>
                </div>
              </section>

              <section>
                <div className="container map-layout">
                  <div className="map-copy reveal">
                    <div className="eyebrow" style={{ marginBottom: 12 }}>Enterprise Presence</div>
                    <h4>Map section included for location credibility and business trust.</h4>
                    <p>
                      You wanted maps included, so this section gives the website a stronger corporate presence. Replace the embedded map later with your exact office or service-region location if needed.
                    </p>
                    <div className="map-list">
                      <div className="map-item"><strong>Primary Focus</strong><span>Saudi Arabia, India, UAE, and neighboring regions</span></div>
                      <div className="map-item"><strong>Audience</strong><span>Enterprises needing digital transformation solutions</span></div>
                      <div className="map-item"><strong>Core Areas</strong><span>AI, IoT, Cybersecurity, Cloud, Analytics, ICT</span></div>
                    </div>
                  </div>

                  <div className="map-card reveal">
                    <iframe
                      className="map-frame"
                      loading="lazy"
                      allowFullScreen
                      referrerPolicy="no-referrer-when-downgrade"
                      src="https://www.openstreetmap.org/export/embed.html?bbox=46.57%2C24.62%2C46.77%2C24.78&layer=mapnik"
                      title="Bizzapt regional map"
                    ></iframe>
                  </div>
                </div>
              </section>

              <section id="contact">
                <div className="container contact-grid">
                  <div className="contact-card reveal">
                    <div className="eyebrow" style={{ marginBottom: 12 }}>Contact Us</div>
                    <h4 style={{ fontSize: 'clamp(2rem, 3vw, 2.8rem)', lineHeight: 1.08 }}>
                      Ready to position Bizzapt Enterprises as a premium enterprise technology brand.
                    </h4>
                    <p style={{ marginTop: 14 }}>
                      This contact section is built for enterprise leads, brochure requests, and quote generation. It can later be extended into recruitment portal, downloadable brochures, client portal access, and AI chatbot support.
                    </p>
                    <div className="contact-list">
                      <div className="contact-item"><strong>Website Goals</strong><span>Professional, dynamic, modern, and enterprise-focused</span></div>
                      <div className="contact-item"><strong>Regions</strong><span>Saudi Arabia, India, UAE, and neighboring markets</span></div>
                      <div className="contact-item"><strong>Future Scope</strong><span>Bilingual support, portals, dashboards, AI chatbot, and subscriptions</span></div>
                    </div>
                  </div>

                  <div className="form-card reveal">
                    <div className="eyebrow" style={{ marginBottom: 12 }}>Request a Quote</div>
                    <form onSubmit={onSubmit}>
                      <div className="two-col">
                        <input name="name" value={form.name} onChange={onChange} placeholder="Your name" required />
                        <input name="email" type="email" value={form.email} onChange={onChange} placeholder="Email address" required />
                      </div>
                      <div className="two-col">
                        <input name="company" value={form.company} onChange={onChange} placeholder="Company name" required />
                        <select name="service" value={form.service} onChange={onChange}>
                          <option>Cybersecurity</option>
                          <option>AI Solutions</option>
                          <option>IoT Solutions</option>
                          <option>Cloud Solutions</option>
                          <option>Data Analytics & BI</option>
                          <option>ICT & IT Infrastructure</option>
                        </select>
                      </div>
                      <textarea name="message" value={form.message} onChange={onChange} placeholder="Tell us about your enterprise requirements" required></textarea>
                      <button className="btn btn-primary" type="submit">Send Inquiry</button>
                      {submitted ? <p style={{ color: '#b8fff1' }}>Inquiry sent successfully.</p> : null}
                    </form>
                  </div>
                </div>
              </section>
            </main>

            <footer className="footer">
              <div className="container">
                <div className="footer-panel">
                  <div>
                    <strong style={{ display: 'block', marginBottom: 6 }}>Bizzapt Enterprises</strong>
                    <div>
                      Ultra premium enterprise homepage concept with real 3D globe, blog section, map, subtle Islamic-inspired pattern details, and future-ready structure.
                    </div>
                  </div>
                  <div>© 2026 Bizzapt Enterprises. All rights reserved.</div>

                  <div className="footer-devs">
                    <div className="dev-card">
                      <strong>Rayeesa Mahmood</strong>
                      <p>Frontend & Backend Web Developer | Software Engineer</p>
                      <a href="https://portfolio-xi-one-64.vercel.app/" target="_blank" rel="noreferrer">Website</a><br />
                      <a href="https://www.linkedin.com/in/rayeesa-mahmood/" target="_blank" rel="noreferrer">LinkedIn</a><br />
                      <a href="mailto:rayeesamhamood8098@gmail.com">rayeesamhamood8098@gmail.com</a>
                    </div>

                    <div className="dev-card">
                      <strong>Reda Kaleem</strong>
                      <p>Open-Source Contributor | Community Builder | Python Developer | Data Science Enthusiast</p>
                      <a href="https://github.com/RedaKaleem" target="_blank" rel="noreferrer">GitHub</a><br />
                      <a href="https://bio.link/redakaleem" target="_blank" rel="noreferrer">Bio Link</a><br />
                      <a href="mailto:kaleemreda@gmail.com">kaleemreda@gmail.com</a>
                    </div>
                  </div>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      function runChecks() {
        console.assert(Array.isArray(features) && features.length === 3, 'features should have 3 items');
        console.assert(Array.isArray(services) && services.length === 6, 'services should have 6 items');
        console.assert(Array.isArray(projects) && projects.length === 3, 'projects should have 3 items');
        console.assert(Array.isArray(regions) && regions.length === 3, 'regions should have 3 items');
        console.assert(Array.isArray(blogs) && blogs.length === 3, 'blogs should have 3 items');
        console.assert(document.getElementById('root'), 'root element should exist');
      }

      runChecks();
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
